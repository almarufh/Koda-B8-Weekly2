<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeliMudah</title>
    <link rel="stylesheet" href="style.css">
    <style>
.header {
    width: 1280px;
    height: 65px;
    margin: auto;
    background-color: azure;
}
.top-header {
    position: relative;
    width: 1280px;
    height: 28px;
    margin: auto;
    background-color: blue;
}
.navbar {
    width: 1280px;
    height: 41px;
    margin: auto;
    background-color: #14acac;
}
.content-first {
    border: 1px solid black;
    height: 420px;
    margin: auto;
    width: 1728px;
    position: relative;
    top: 106px;
}
.first-left {
    position: absolute;
    height: 420px;
    width: 640px;
    border: 1px solid red;
    left: 224px;
}
.first-right {
    position: absolute;
    height: 420px;
    width: 640px;
    right: 224px;
    border: 1px solid #6f00ff;
}
.top-left {
    position: absolute;
    display: inline-block;
    background-color: azure;
    width: 156px;
    height: 16px;
    bottom: 8px;
}
.top-left {
    position: absolute;
    display: inline-block;
    background-color: azure;
    width: 156px;
    height: 16px;
    bottom: 8px;
}
    </style>
</head>
<body>
    <div class="canvas">
        <div class="top">
            <div class="second-canvas">
                <!-- Header -->
                <div class="top-header">
                    <div class="top-left"></div>
                    <div class="top-right"></div>
                </div>
                <div class="header"></div>
                <div class="navbar"></div>
                <!-- Header End -->
                <div class="main"></div>
            </div>
        </div>

        <!-- Content -->
        <div class="content-first">
            <div class="first-left"></div>
            <div class="first-right"></div>
        </div>
        <!--  Contend End -->

        <!-- Footer -->
        <div class="footer">
            <div class="footer-first"></div>
            <div class="footer-second"></div>
            <div class="footer-third"></div>
        </div>
    </div>
</body>
</html>
